{% extends "base.html" %}
{% block title %}Sign in · weedr{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="auth-backdrop" aria-hidden="true"></div>
  <div class="card auth-card">
    <div class="auth-brand">{% set logo_extra_class = 'logo-mark-lg' %}{% include 'partials/logo_mark.html' %}</div>
    <h1>Welcome back</h1>
    <p class="muted">Sign in to your cloud torrent desk</p>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" action="{{ url_for('login') }}" class="stack">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required autofocus>
      <button type="submit" class="btn primary">Continue</button>
    </form>
  </div>
</div>
{% endblock %}
