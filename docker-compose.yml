services:
  weedr:
    build: .
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      DOWNLOAD_DIR: /data/downloads
      ZIP_STORAGE_DIR: /data/zips
      QBITTORRENT_STATE_DIR: /data/qbt-state
      HOST: 0.0.0.0
      PORT: "5000"
    volumes:
      - downloads:/data/downloads
      - zips:/data/zips
      - qbittorrent_state:/data/qbt-state

volumes:
  downloads:
  zips:
  qbittorrent_state:
